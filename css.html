<!DOCTYPE html>
<html>
<head>
<title>CSS Demonstration</title>

<!-- INTERNAL CSS -->
<style>

.paragraph2{
color:orange;
font-weight:bold;
}

.highlight2{
color:green;
}

.building2{
color:red;
}

</style>

<!-- EXTERNAL CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>CSS Demonstration</h2>

<!-- PARAGRAPHS -->

<p style="color:blue; font-style:italic;">
Paragraph 1 - Styled using INLINE CSS
</p>

<p class="paragraph2">
Paragraph 2 - Styled using INTERNAL CSS
</p>

<p class="paragraph3">
Paragraph 3 - Styled using EXTERNAL CSS
</p>


<!-- HIGHLIGHTS -->

<h1 style="color:red;">
Highlight 1 - Inline CSS
</h1>

<h1 class="highlight2">
Highlight 2 - Internal CSS
</h1>

<h1 class="highlight3">
Highlight 3 - External CSS
</h1>


<!-- BUILDINGS -->

<h3 style="color:purple;">
Building 1 - Inline CSS
</h3>

<h3 class="building2">
Building 2 - Internal CSS
</h3>

<h3 class="building3">
Building 3 - External CSS
</h3>

</body>
</html>
