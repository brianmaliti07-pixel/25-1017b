<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>
<style>
body{
  margin:0;
  font-family:Segoe UI,sans-serif;
  background:radial-gradient(circle,#0f172a,#020617);
  color:white;
}

/* NAVIGATION */
nav{
  display:flex;
  justify-content:center;
  gap:40px;
  padding:20px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}
nav a{
  text-decoration:none;
  color:#cbd5f5;
  font-size:18px;
  transition:0.3s;
}
nav a:hover{color:#38bdf8;text-shadow:0 0 10px #38bdf8;}

/* TITLE */
h1{
  text-align:center;
  margin-top:50px;
  font-size:50px;
  color:#38bdf8;
  text-shadow:0 0 10px #38bdf8,0 0 20px #38bdf8;
}

/* GRID */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:30px;
  max-width:1200px;
  margin:50px auto;
}

/* ITEM */
.gallery-item{
  position:relative;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 20px #38bdf8;
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  height:250px;
  cursor:pointer;
}

/* IMAGES STACKED */
.gallery-item img{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  top:0;
  left:0;
  opacity:0;
  transition:opacity 1s ease-in-out;
  z-index:0;
}

.gallery-item img.active{
  opacity:1;
  z-index:1;
}

.caption{
  position:absolute;
  bottom:0;
  width:100%;
  text-align:center;
  color:#cbd5f5;
  font-size:16px;
  font-weight:600;
  text-shadow:0 0 10px #38bdf8,0 0 20px #38bdf8;
  padding:5px 0;
  background:rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="gallery.html">Gallery</a>
<a href="videos.html">Videos</a>
<a href="contact.html">Contact</a>
</nav>

<h1>Gallery</h1>

<div class="gallery-grid">
  <div class="gallery-item" id="col1">
    <img src="https://images.pexels.com/photos/373543/pexels-photo-373543.jpeg?auto=compress&cs=tinysrgb&w=800" class="active">
    <img src="https://images.pexels.com/photos/373562/pexels-photo-373562.jpeg?auto=compress&cs=tinysrgb&w=800">
    <img src="https://images.pexels.com/photos/373540/pexels-photo-373540.jpeg?auto=compress&cs=tinysrgb&w=800">
    <img src="https://images.pexels.com/photos/373541/pexels-photo-373541.jpeg?auto=compress&cs=tinysrgb&w=800">
    <img src="https://images.pexels.com/photos/373542/pexels-photo-373542.jpeg?auto=compress&cs=tinysrgb&w=800">
    <div class="caption">Ignite Your Imagination</div>
  </div>

  <div class="gallery-item" id="col2">
    <img src="https://images.pexels.com/photos/373544/pexels-photo-373544.jpeg?auto=compress&cs=tinysrgb&w=800" class="active">
    <img src="https://images.pexels.com/photos/373545/pexels-photo-373545.jpeg?auto=compress&cs=tinysrgb&w=800">
    <img src="https://images.pexels.com/photos/373546/pexels-photo-373546.jpeg?auto=compress&cs=tinysrgb&w=800">
    <img src="https://images.pexels.com/photos/373547/pexels-photo-373547.jpeg?auto=compress&cs=tinysrgb&w=800">
    <img src="https://images.pexels.com/photos/373548/pexels-photo-373548.jpeg?auto=compress&cs=tinysrgb&w=800">
    <div class="caption">Perception Reimagined</div>
  </div>
</div>

<script>
// FUNCTION TO CYCLE IMAGES BACK TO BACK
function autoCycle(columnId){
  const container = document.getElementById(columnId);
  const imgs = container.getElementsByTagName("img");
  let current = 0;
  setInterval(()=>{
    imgs[current].classList.remove("active");
    current = (current + 1) % imgs.length;
    imgs[current].classList.add("active");
  },3000);
}

autoCycle("col1");
autoCycle("col2");
</script>


<footer>

</footer>

 </footer>

<script>

const observer = new IntersectionObserver((entries)=>{
entries.forEach((entry)=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
});

const hiddenElements = document.querySelectorAll(".hidden");
hiddenElements.forEach((el)=>observer.observe(el));

</script>

</body>
