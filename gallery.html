<style>

.slideshow{
width:500px;
margin:auto;
}

.slideshow img{
width:100%;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<h1>Image Gallery</h1>

<div class="slideshow">

<img id="gallery" src="https://picsum.photos/500?1">

</div>

<script>

let images = [
"https://picsum.photos/500?1",
"https://picsum.photos/500?2",
"https://picsum.photos/500?3",
"https://picsum.photos/500?4",
"https://picsum.photos/500?5"
];

let i = 0;

function changeImage(){

i++;

if(i >= images.length){
i = 0;
}

document.getElementById("gallery").src = images[i];

}

setInterval(changeImage,3000);

</script>

</body>
