<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(270deg,#0a0a0f,#1a1a2e,#0a0a0f);
  background-size: 600% 600%;
  animation: gradientShift 20s ease infinite;
  color:white;
  scroll-behavior:smooth;
  overflow-x:hidden;
}

@keyframes gradientShift {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* NAV BUTTONS */
nav{
  text-align:center;
  background:#0d47a1;
  padding:15px 0;
}
nav a{
  display:inline-block;
  margin:0 10px;
  padding:12px 25px;
  font-weight:bold;
  color:white;
  text-decoration:none;
  border-radius:8px;
  background: rgba(56,189,248,0.2);
  transition:0.3s;
}
nav a:hover{
  background:#38bdf8;
  color:#0a0a0f;
  transform: scale(1.05);
}

/* PAGE HEADING */
h1{
  text-align:center;
  margin-top:40px;
  font-size:2.5rem;
}

/* GALLERY GRID */
.container{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:30px;
}
.box{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}
.box img{
  width:100%;
  display:block;
  transition: transform 0.4s ease;
}
.box:hover img{
  transform: scale(1.1);
}
.box p{
  text-align:center;
  color:#38bdf8;
  padding:10px 5px;
}

/* HIDDEN / SHOW ANIMATION */
.hidden{
  opacity:0;
  transform: translateY(40px);
  transition: all 0.8s ease;
}
.show{
  opacity:1;
  transform: translateY(0);
}

/* FOOTER */
footer{
  background:#0d47a1;
  color:white;
  text-align:center;
  padding:15px;
  margin-top:40px;
}
</style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="gallery.html">Gallery</a>
  <a href="videos.html">Videos</a>
  <a href="contact.html">Contact</a>
  <a href="css.html">Css</a>
</nav>

<h1 class="hidden">Gallery</h1>

<div class="container hidden">
  <div class="box hidden">
    <img src="https://picsum.photos/id/1015/400/300" alt="Gallery 1">
    <p>Immersive visual concept #1</p>
  </div>
  <div class="box hidden">
    <img src="https://picsum.photos/id/1016/400/300" alt="Gallery 2">
    <p>Immersive visual concept #2</p>
  </div>
  <div class="box hidden">
    <img src="https://picsum.photos/id/1018/400/300" alt="Gallery 3">
    <p>Immersive visual concept #3</p>
  </div>
  <div class="box hidden">
    <img src="https://picsum.photos/id/1019/400/300" alt="Gallery 4">
    <p>Immersive visual concept #4</p>
  </div>
  <div class="box hidden">
    <img src="https://picsum.photos/id/1020/400/300" alt="Gallery 5">
    <p>Immersive visual concept #5</p>
  </div>
  <div class="box hidden">
    <img src="https://picsum.photos/id/1021/400/300" alt="Gallery 6">
    <p>Immersive visual concept #6</p>
  </div>
</div>

<footer>
<p>© 2026 Brian Elijah Maliti Onyango</p>
<p>Innovation • Creativity • Technology</p>
</footer>

<script>
// SCROLL ANIMATION
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});
document.querySelectorAll(".hidden").forEach(el=>observer.observe(el));
</script>

</body>
  </html>
