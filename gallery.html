<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>
<style>
body{
  margin:0;
  font-family:Segoe UI,sans-serif;
  background:radial-gradient(circle,#0f172a,#020617);
  color:white;
  overflow-x:hidden;
}

/* NAVIGATION */
nav{
  display:flex;
  justify-content:center;
  gap:40px;
  padding:20px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}
nav a{
  text-decoration:none;
  color:#cbd5f5;
  font-size:18px;
  transition:0.3s;
}
nav a:hover{color:#38bdf8;text-shadow:0 0 10px #38bdf8;}

/* TITLE */
h1{
  text-align:center;
  margin-top:50px;
  font-size:50px;
  color:#38bdf8;
  text-shadow:0 0 10px #38bdf8,0 0 20px #38bdf8;
}

/* GALLERY GRID */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:30px;
  max-width:1200px;
  margin:50px auto;
}

.gallery-item{
  position:relative;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 0 20px #38bdf8;
  transition:0.4s;
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
}

.gallery-item:hover{
  transform:scale(1.05);
  box-shadow:0 0 40px #38bdf8;
}

.gallery-item img{
  width:100%;
  height:250px;
  object-fit:cover;
  position:absolute;
  top:0;
  left:0;
  transition:opacity 1s ease-in-out;
  opacity:0;
}

.gallery-item img.active{
  opacity:1;
}

.caption{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
  color:#cbd5f5;
  font-size:16px;
  font-weight:600;
  text-shadow:0 0 10px #38bdf8,0 0 20px #38bdf8;
  padding:5px 10px;
  backdrop-filter:blur(5px);
  background:rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="gallery.html">Gallery</a>
<a href="videos.html">Videos</a>
<a href="contact.html">Contact</a>
</nav>

<h1>Gallery</h1>

<div class="gallery-grid">
  <div class="gallery-item" id="col1">
    <img src="https://images.unsplash.com/photo-1581091870627-134d3b38e346?auto=format&fit=crop&w=800&q=80" class="active" alt="">
    <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=800&q=80" alt="">
    <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=800&q=80" alt="">
    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&w=800&q=80" alt="">
    <img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f?auto=format&fit=crop&w=800&q=80" alt="">
    <div class="caption">Ignite Your Imagination</div>
  </div>

  <div class="gallery-item" id="col2">
    <img src="https://images.unsplash.com/photo-1605902711622-cfb43c443e0c?auto=format&fit=crop&w=800&q=80" class="active" alt="">
    <img src="https://images.unsplash.com/photo-1581093588401-0f0f2be1e943?auto=format&fit=crop&w=800&q=80" alt="">
    <img src="https://images.unsplash.com/photo-1532777946371-3c0fbe5ff57d?auto=format&fit=crop&w=800&q=80" alt="">
    <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=800&q=80" alt="">
    <img src="https://images.unsplash.com/photo-1515378791036-0648a3ef77b2?auto=format&fit=crop&w=800&q=80" alt="">
    <div class="caption">Perception Reimagined</div>
  </div>
</div>

<script>
// AUTO-CYCLE IMAGES EVERY 3 SECONDS
function cycleImages(columnId){
  const container = document.getElementById(columnId);
  const imgs = container.getElementsByTagName("img");
  let current = 0;
  setInterval(()=>{
    imgs[current].classList.remove("active");
    current = (current + 1) % imgs.length;
    imgs[current].classList.add("active");
  },3000);
}

cycleImages("col1");
cycleImages("col2");
</script>

</body>
  </html>
