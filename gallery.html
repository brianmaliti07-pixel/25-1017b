<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0a0a0f;
  color:white;
  scroll-behavior:smooth;
}
nav{
  text-align:center;
  background:#0d47a1;
  padding:15px 0;
}
nav a{
  display:inline-block;
  margin:0 10px;
  padding:12px 25px;
  font-weight:bold;
  color:white;
  text-decoration:none;
  border-radius:8px;
  background: rgba(56,189,248,0.2);
  transition:0.3s;
}
nav a:hover{
  background:#38bdf8;
  color:#0a0a0f;
  transform: scale(1.05);
}
h1{
  text-align:center;
  margin-top:40px;
  font-size:2.2rem;
}

/* GROUPS OF 2 ALWAYS */
.container{
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  margin:30px 10px;
}
.box{
  flex: 1 1 calc(50% - 20px);
  max-width: calc(50% - 20px);
  background: rgba(255,255,255,0.1);
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
  transition:all 0.3s ease;
}
.box img{
  width:100%;
  display:block;
}
.box:hover{
  transform: scale(1.05);
  box-shadow:0 4px 12px rgba(56,189,248,0.5);
}
footer{
  background:#0d47a1;
  color:white;
  text-align:center;
  padding:15px;
  margin-top:40px;
}
</style>
