<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>
<style>
body{
  margin:0;
  font-family:Segoe UI,sans-serif;
  background:radial-gradient(circle,#0f172a,#020617);
  color:white;
  overflow-x:hidden;
}

/* NAVIGATION */
nav{
  display:flex;
  justify-content:center;
  gap:40px;
  padding:20px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}
nav a{
  text-decoration:none;
  color:#cbd5f5;
  font-size:18px;
  transition:0.3s;
}
nav a:hover{color:#38bdf8;text-shadow:0 0 10px #38bdf8;}

/* TITLE */
h1{
  text-align:center;
  margin-top:50px;
  font-size:50px;
  color:#38bdf8;
  text-shadow:0 0 10px #38bdf8,0 0 20px #38bdf8;
}

/* GALLERY BOXES */
.gallery-container{
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:50px;
  flex-wrap:wrap;
  transition:0.5s;
}

.gallery-box{
  width:280px;
  height:400px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  border-radius:15px;
  overflow:hidden;
  position:relative;
  box-shadow:0 0 20px #38bdf8;
  transition:0.5s;
  cursor:pointer;
}

.gallery-box.active{
  width:380px; /* widens on click */
  box-shadow:0 0 50px #38bdf8;
}

.gallery-box img{
  width:100%;
  height:300px;
  object-fit:cover;
  position:absolute;
  top:0;
  left:0;
  transition:opacity 1s ease-in-out;
  opacity:1;
}

.gallery-text{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
  color:#cbd5f5;
  font-size:14px;
  line-height:1.3;
  padding:0 10px;
  text-shadow:0 0 5px #000;
}

.gallery-text span{
  color:#38bdf8;
  font-weight:600;
  text-shadow:0 0 10px #38bdf8,0 0 20px #38bdf8;
}

</style>
</head>
<body>

<script>
// ROTATE IMAGES AUTOMATICALLY
function rotateBoxImages(boxId){
  const box=document.getElementById(boxId);
  const imgs=box.getElementsByTagName("img");
  let current=0;
  setInterval(()=>{
    imgs[current].style.opacity=0;
    current=(current+1)%imgs.length;
    imgs[current].style.opacity=1;
  },3000);
}
rotateBoxImages("box1");
rotateBoxImages("box2");
rotateBoxImages("box3");

// CLICK TO WIDEN / FOCUS
const boxes=document.getElementsByClassName("gallery-box");
let activeBox=null;

for(let box of boxes){
  box.addEventListener("click",()=>{
    if(activeBox && activeBox!==box) activeBox.classList.remove("active");
    box.classList.toggle("active");
    activeBox = box.classList.contains("active") ? box : null;
  });
}
</script>
