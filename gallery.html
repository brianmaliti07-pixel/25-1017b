<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0a0a0f;
  color:white;
  scroll-behavior:smooth;
}

nav{
  text-align:center;
  background:#0d47a1;
  padding:15px 0;
}
nav a{
  display:inline-block;
  margin:0 10px;
  padding:12px 25px;
  font-weight:bold;
  color:white;
  text-decoration:none;
  border-radius:8px;
  background: rgba(56,189,248,0.2);
  transition:0.3s;
}
nav a:hover{
  background:#38bdf8;
  color:#0a0a0f;
  transform: scale(1.05);
}

h1{
  text-align:center;
  margin-top:40px;
  font-size:2.2rem;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  margin:30px 20px;
}
.box{
  background: rgba(255,255,255,0.1);
  padding:0;
  width:300px;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
  transition:all 0.3s ease;
}
.box img{
  width:100%;
  display:block;
  border-bottom:2px solid #38bdf8;
}
.box:hover{
  transform: scale(1.05);
  box-shadow:0 4px 12px rgba(56,189,248,0.5);
}

footer{
  background:#0d47a1;
  color:white;
  text-align:center;
  padding:15px;
  margin-top:40px;
}

@media screen and (max-width:650px){
  .box{
    width:90%;
  }
}
</style>
</head>
<body>

<!-- NAVIGATION -->
<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="gallery.html">Gallery</a>
  <a href="videos.html">Videos</a>
  <a href="contact.html">Contact</a>
  <a href="css.html">Css</a>
</nav>

<h1>Gallery</h1>

<div class="container">
  <div class="box"><img src="images/img1.jpg" alt="Image 1"></div>
  <div class="box"><img src="images/img2.jpg" alt="Image 2"></div>
  <div class="box"><img src="images/img3.jpg" alt="Image 3"></div>
  <div class="box"><img src="images/img4.jpg" alt="Image 4"></div>
  <div class="box"><img src="images/img5.jpg" alt="Image 5"></div>
  <div class="box"><img src="images/img6.jpg" alt="Image 6"></div>
</div>

<footer>
  <p>© 2026 Brian Elijah Maliti Onyango</p>
</footer>

</body>
</html>
